---
- name: reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: reload nftables
  ansible.builtin.service:
    name: nftables
    state: reloaded

- name: restart dnsmasq
  ansible.builtin.service:
    name: dnsmasq
    state: restarted

- name: reload NetworkManager
  ansible.builtin.service:
    name: NetworkManager
    state: reloaded
