---
- name: Install docker.io
  ansible.builtin.apt:
    name: docker.io
    state: present
    update_cache: false

- name: Add newton to docker group
  ansible.builtin.user:
    name: newton
    groups: docker
    append: true

- name: Enable and start Docker service
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started
