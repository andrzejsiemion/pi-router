---
- name: Configure Raspberry Pi 5 — LTE internet sharing
  hosts: garage
  become: true

  pre_tasks:
    - name: Set valid default locale (avoids Ansible controller locale errors)
      ansible.builtin.copy:
        dest: /etc/default/locale
        content: |
          LANG=C.UTF-8
          LC_ALL=C.UTF-8
        owner: root
        group: root
        mode: "0644"
      tags: [always]

  roles:
    - role: slack_notify
      tags: [slack_notify]

    - role: waveshare_ups
      tags: [waveshare_ups]

    - role: modem
      tags: [modem]

    - role: twingate_connector
      tags: [connector]

    - role: docker
      tags: [docker]

    - role: speedtest
      tags: [speedtest]

    - role: router
      tags: [router]

    - role: wifi_hotspot
      tags: [wifi_hotspot]
